<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webiste-Launch🚀 | Paramount School</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --gold: #dfba6b;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            user-select: none;
        }

        /* Cinematic Visual Stage */
        #launch-stage {
            position: relative;
            width: 100%;
            height: 100%;
            background: url('launch-bg.jpg') no-repeat center center;
            background-size: cover;
            transition: transform 0.1s ease;
        }

        /* Overlay to keep the image looking crisp and high-contrast */
        .color-grade {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.4) 100%);
            z-index: 1;
            pointer-events: none;
        }

        /* Interactive Control Container mapping above graphic borders */
        .ui-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
        }

        /* 1. Countdown Box Overlay (Mapped exactly over the image clock board) */
        .live-countdown-board {
            position: absolute;
            top: 16.5%; /* Precision alignment over the image board box */
            right: 7.5%;
            width: 38%;
            height: 13%;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 20px;
            box-sizing: border-box;
            pointer-events: none;
        }

        .clock-segment {
            text-align: center;
            color: #fff;
            text-shadow: 0 0 20px rgba(255,255,255,0.6), 0 0 10px rgba(223,186,107,0.5);
            font-family: monospace;
            font-weight: 900;
            font-size: 3.5vw;
            line-height: 1;
        }

        /* 2. Hot-Zone Invisible Click Target Wrapper (Mapped over the gold button handle area) */
        .button-target-zone {
            position: absolute;
            bottom: 3%;
            right: 17%;
            width: 30%;
            height: 42%;
            cursor: not-allowed; /* Shows locked state initially */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Glowing overlay that appears *only* when unlocked */
        .button-glow-ring {
            position: absolute;
            width: 80%;
            height: 80%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,215,0,0.4) 0%, transparent 70%);
            opacity: 0;
            pointer-events: none;
        }

        /* System Notice Banner at bottom */
        .status-strip {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.75);
            border: 1px solid rgba(223,186,107,0.3);
            padding: 10px 30px;
            border-radius: 50px;
            color: #ccc;
            font-size: 0.75rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            z-index: 10;
            pointer-events: none;
        }

        .status-strip i {
            color: var(--gold);
        }

        /* 3. Screen Burn Flame Overlay on Launch */
        #launch-firewash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 35% 65%, rgba(255,100,0,0.6) 0%, rgba(255,215,0,0.2) 50%, transparent 100%);
            z-index: 4;
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="launch-stage">
        <div class="color-grade"></div>
        
        <div class="ui-container">
            <div class="live-countdown-board">
                <div class="clock-segment"><span id="days-val">00</span></div>
                <div class="clock-segment"><span id="hours-val">00</span></div>
                <div class="clock-segment"><span id="minutes-val">00</span></div>
                <div class="clock-segment"><span id="seconds-val">00</span></div>
            </div>

            <div id="activation-target" class="button-target-zone">
                <div id="glow-emitter" class="button-glow-ring"></div>
            </div>
        </div>
    </div>

    <div id="launch-firewash"></div>

    <div id="status-alert" class="status-strip">
        <i class="fas fa-lock mr-2"></i> Ignition Sequence Safe • Core Systems Encrypted
    </div>

    <script>
        // Set your target launch day right here
        const targetLaunchDate = new Date("May 20, 2026 09:00:00").getTime();
        
        let systemsDecrypted = false;
        const targetZone = document.getElementById('activation-target');
        const alertBanner = document.getElementById('status-alert');

        // --- COUNTDOWN SCHEDULER ENGINE ---
        const syncTimerLoop = setInterval(() => {
            const currentTime = new Date().getTime();
            const timeDifference = targetLaunchDate - currentTime;

            // Calculations for display parsing
            const secUnit = 1000, minUnit = secUnit * 60, hrUnit = minUnit * 60, dayUnit = hrUnit * 24;

            if (timeDifference <= 0) {
                clearInterval(syncTimerLoop);
                
                // Zero everything explicitly
                document.getElementById('days-val').innerText = "00";
                document.getElementById('hours-val').innerText = "00";
                document.getElementById('minutes-val').innerText = "00";
                document.getElementById('seconds-val').innerText = "00";
                
                authorizeSystemUnlock();
                return;
            }

            document.getElementById('days-val').innerText = String(Math.floor(timeDifference / dayUnit)).padStart(2, '0');
            document.getElementById('hours-val').innerText = String(Math.floor((timeDifference % dayUnit) / hrUnit)).padStart(2, '0');
            document.getElementById('minutes-val').innerText = String(Math.floor((timeDifference % hrUnit) / minUnit)).padStart(2, '0');
            document.getElementById('seconds-val').innerText = String(Math.floor((timeDifference % minUnit) / secUnit)).padStart(2, '0');
        }, 1000);

        // --- AUTHORIZE ACTION (Timer hits 0) ---
        function authorizeSystemUnlock() {
            systemsDecrypted = true;
            targetZone.style.cursor = 'pointer'; // Turn pointer switch style active
            
            // Pulse a gold indicator right over the image button handle area
            gsap.to("#glow-emitter", { opacity: 1, duration: 1.5, repeat: -1, yoyo: true });
            
            alertBanner.innerHTML = `<i class="fas fa-unlock-alt mr-2 animate-pulse"></i> Systems Active • Click Button to Launch Portal`;
            
            // Wire interaction click logic handler
            targetZone.addEventListener('click', engagePortalBlastOff);
        }

        // --- CINEMATIC BLAST OFF TRANSITION SCENE ---
        function engagePortalBlastOff() {
            if (!systemsDecrypted) return;
            systemsDecrypted = false; // Guard duplicate triggers
            
            targetZone.style.cursor = 'default';
            alertBanner.innerHTML = `<i class="fas fa-satellite mr-2 animate-spin"></i> Launching Into The Future...`;

            // 1. Instantly swell the fire/plasma glow element over the rocket exhaust graphics
            gsap.to("#launch-firewash", { opacity: 1, duration: 1.2, ease: "power2.out" });

            // 2. Tectonic Core Shake Effect (Vibrates the frame background wrapper)
            const shakeTimeline = gsap.timeline();
            shakeTimeline.to("#launch-stage", { duration: 0.05, x: "+=12", yoyo: true, repeat: 25 })
                         .to("#launch-stage", { duration: 0.05, y: "+=8", yoyo: true, repeat: 25 }, 0);

            // 3. Vertical Propulsion Lift Upward (Rocket lifts off, screen drops down)
            gsap.to("#launch-stage", { 
                y: "120%", 
                scale: 0.95,
                duration: 3.5, 
                delay: 1.5,
                ease: "power4.in",
                onComplete: () => {
                    // 4. Force global destination router path transfer redirect
                    window.location.href = "https://paramountschooledu.in/";
                }
            });

            // Fade body tone gracefully into void space background setting
            gsap.to("body", { backgroundColor: "#020813", duration: 4, delay: 1 });
        }
    </script>
</body>
</html>
