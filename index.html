<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PARAMOUNT ENGLISH MEDIUM HIGH SCHOOL</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      overflow: hidden;
      background: #000;
      color: white;
      height: 100vh;
      position: relative;
    }

    .background {
      position: absolute;
      width: 100%;
      height: 100%;
      background:
        radial-gradient(circle at top left, rgba(0,123,255,0.35), transparent 30%),
        radial-gradient(circle at bottom right, rgba(140,0,255,0.35), transparent 30%),
        linear-gradient(135deg, #020617, #000000, #0f172a);
      z-index: -3;
    }

    .particles {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: -2;
    }

    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: rgba(255,255,255,0.8);
      border-radius: 50%;
      animation: float 10s linear infinite;
    }

    @keyframes float {
      from {
        transform: translateY(100vh) scale(0);
        opacity: 0;
      }
      50% {
        opacity: 1;
      }
      to {
        transform: translateY(-10vh) scale(1);
        opacity: 0;
      }
    }

    .container {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      position: relative;
      z-index: 5;
    }

    .logo-box {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 25px;
      box-shadow: 0 0 50px rgba(255,255,255,0.1);
      animation: pulse 3s infinite;
    }

    .logo-box img {
      width: 90px;
      height: 90px;
      object-fit: contain;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.05);
      }
      100% {
        transform: scale(1);
      }
    }

    .school-name {
      font-size: 4rem;
      font-weight: 800;
      line-height: 1.1;
      background: linear-gradient(to right, #ffffff, #93c5fd, #d8b4fe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 20px rgba(255,255,255,0.1);
      margin-bottom: 20px;
    }

    .subtitle {
      font-size: 1.3rem;
      color: #d1d5db;
      max-width: 900px;
      line-height: 1.7;
      margin-bottom: 60px;
    }

    .countdown {
      display: flex;
      gap: 25px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .time-box {
      width: 160px;
      height: 170px;
      border-radius: 30px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(20px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 40px rgba(255,255,255,0.08);
      transition: 0.4s ease;
    }

    .time-box:hover {
      transform: translateY(-10px) scale(1.05);
      box-shadow: 0 0 60px rgba(147,197,253,0.3);
    }

    .time {
      font-size: 4rem;
      font-weight: 800;
    }

    .label {
      margin-top: 10px;
      text-transform: uppercase;
      letter-spacing: 4px;
      font-size: 0.9rem;
      color: #cbd5e1;
    }

    .launch-text {
      margin-top: 50px;
      color: #94a3b8;
      letter-spacing: 6px;
      font-size: 0.9rem;
      text-transform: uppercase;
    }

    .launch-button {
      margin-top: 45px;
      padding: 22px 50px;
      border-radius: 100px;
      font-size: 1.2rem;
      font-weight: 700;
      border: none;
      cursor: pointer;
      transition: 0.4s ease;
      background: linear-gradient(90deg, #3b82f6, #8b5cf6, #ec4899);
      color: white;
      box-shadow: 0 0 60px rgba(168,85,247,0.6);
      display: none;
      text-decoration: none;
    }

    .launch-button:hover {
      transform: scale(1.08);
      box-shadow: 0 0 80px rgba(236,72,153,0.8);
    }

    .locked-button {
      margin-top: 45px;
      padding: 22px 50px;
      border-radius: 100px;
      font-size: 1.1rem;
      font-weight: 600;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08);
      color: #9ca3af;
      backdrop-filter: blur(15px);
      cursor: not-allowed;
    }

    .rocket {
      position: absolute;
      bottom: -200px;
      font-size: 100px;
      animation: rocketLaunch 8s linear infinite;
      opacity: 0.15;
      z-index: -1;
    }

    @keyframes rocketLaunch {
      0% {
        transform: translateY(0) translateX(0) rotate(-20deg);
      }
      100% {
        transform: translateY(-120vh) translateX(50vw) rotate(20deg);
      }
    }

    @media(max-width: 768px) {
      body {
        overflow-y: auto;
      }

      .school-name {
        font-size: 2.2rem;
      }

      .subtitle {
        font-size: 1rem;
      }

      .time-box {
        width: 120px;
        height: 130px;
      }

      .time {
        font-size: 2.8rem;
      }

      .label {
        font-size: 0.7rem;
      }

      .launch-button,
      .locked-button {
        padding: 18px 35px;
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>

  <div class="background"></div>
  <div class="particles" id="particles"></div>

  <div class="rocket">🚀</div>

  <div class="container">

    <div class="logo-box">
      <!-- Replace logo URL with your school logo -->
      <img src="https://upload.wikimedia.org/wikipedia/commons/a/ac/No_image_available.svg" alt="School Logo">
    </div>

    <h1 class="school-name">
      PARAMOUNT ENGLISH <br>
      MEDIUM HIGH SCHOOL
    </h1>

    <p class="subtitle">
      The Future Of Smart Education Is About To Begin.<br>
      Experience A New Digital Journey For Parents, Students & Teachers.
    </p>

    <div class="countdown">

      <div class="time-box">
        <div class="time" id="days">00</div>
        <div class="label">Days</div>
      </div>

      <div class="time-box">
        <div class="time" id="hours">00</div>
        <div class="label">Hours</div>
      </div>

      <div class="time-box">
        <div class="time" id="minutes">00</div>
        <div class="label">Minutes</div>
      </div>

      <div class="time-box">
        <div class="time" id="seconds">00</div>
        <div class="label">Seconds</div>
      </div>

    </div>

    <div class="launch-text">
      GRAND WEBSITE LAUNCH COUNTDOWN
    </div>

    <button class="locked-button" id="lockedBtn">
      WEBSITE WILL UNLOCK SOON
    </button>

    <!-- Replace your website link below -->
    <a href="https://yourwebsite.com" class="launch-button" id="launchBtn" target="_blank">
      🚀 ENTER OFFICIAL WEBSITE
    </a>

  </div>

  <script>

    // =============================
    // PARTICLES
    // =============================

    const particlesContainer = document.getElementById('particles');

    for(let i = 0; i < 60; i++) {
      const particle = document.createElement('div');
      particle.classList.add('particle');

      particle.style.left = Math.random() * 100 + '%';
      particle.style.animationDuration = (5 + Math.random() * 10) + 's';
      particle.style.animationDelay = Math.random() * 5 + 's';
      particle.style.opacity = Math.random();

      particlesContainer.appendChild(particle);
    }


    // =============================
    // COUNTDOWN TIMER
    // =============================

    // SET YOUR GRAND LAUNCH DATE HERE
    const launchDate = new Date('June 30, 2026 00:00:00').getTime();

    const timer = setInterval(function() {

      const now = new Date().getTime();
      const distance = launchDate - now;

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);

      document.getElementById('days').innerHTML = String(days).padStart(2, '0');
      document.getElementById('hours').innerHTML = String(hours).padStart(2, '0');
      document.getElementById('minutes').innerHTML = String(minutes).padStart(2, '0');
      document.getElementById('seconds').innerHTML = String(seconds).padStart(2, '0');

      if(distance < 0) {
        clearInterval(timer);

        document.getElementById('days').innerHTML = '00';
        document.getElementById('hours').innerHTML = '00';
        document.getElementById('minutes').innerHTML = '00';
        document.getElementById('seconds').innerHTML = '00';

        document.getElementById('lockedBtn').style.display = 'none';
        document.getElementById('launchBtn').style.display = 'inline-block';
      }

    }, 1000);

  </script>

</body>
</html>
