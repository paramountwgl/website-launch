<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paramount School | Digital Horizon Launch</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,900&family=Playfair+Display+SC:wght@700;900&family=Tenor+Sans&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>

    <style>
        :root {
            --brand-green: #004d26;
            --brand-gold: #c7a13c;
            --deep-dark: #000408;
            --off-white: #fdfdfd;
        }

        body {
            margin: 0;
            background: var(--deep-dark);
            color: var(--off-white);
            font-family: 'Tenor Sans', sans-serif;
            overflow: hidden; /* Lock scroll during sequence */
        }

        .hero-font { font-family: 'Playfair Display', serif; }
        .sc-font { font-family: 'Playfair Display SC', serif; }

        #three-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .content-overlay {
            position: relative;
            z-index: 2;
            pointer-events: none;
            opacity: 0;
        }

        .content-overlay * {
            pointer-events: auto;
        }

        /* Ultimate Button */
        .ultimate-btn {
            background: linear-gradient(135deg, var(--brand-gold), #e6c166, var(--brand-gold));
            background-size: 200% auto;
            color: var(--deep-dark);
            box-shadow: 0 10px 40px rgba(199, 161, 60, 0.3);
            display: none; /* Crucial: Hidden by default */
        }

        .ultimate-btn:hover {
            animation: moveGradient 2s infinite linear;
            box-shadow: 0 10px 60px rgba(199, 161, 60, 0.5);
            transform: translateY(-5px);
        }

        @keyframes moveGradient {
            to { background-position: 200% center; }
        }

        .gold-border {
            border: 1px solid rgba(199, 161, 60, 0.2);
        }

        .gold-text {
            color: var(--brand-gold);
        }

        #countdown-container {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .lock-notice {
            letter-spacing: 5px;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.4);
        }

    </style>
</head>
<body>

    <canvas id="three-canvas"></canvas>

    <div class="content-overlay h-screen flex flex-col justify-between p-12 text-center" id="overlay">
        
        <header class="opacity-fade">
            <h2 class="sc-font gold-text text-sm md:text-lg tracking-[0.6em] font-bold uppercase">Paramount School</h2>
            <div class="sc-font text-5xl md:text-8xl tracking-tight leading-tight hero-font italic opacity-70">Warangal</div>
        </header>

        <main class="max-w-4xl mx-auto opacity-fade">
            <h1 class="hero-font text-5xl md:text-9xl leading-none font-black opacity-90 tracking-tighter mb-10">THE DIGITAL <br> HORIZON AWAITS</h1>
            <p class="max-w-lg mx-auto text-gray-400 font-light leading-relaxed mb-16 text-sm md:text-base">
                An institution redefining intelligence. Prepare for the ultimate platform reveal on **May 20, 2026**.
            </p>

            <div id="countdown-container" class="py-12 px-6 flex gap-6 md:gap-14 justify-center gold-border backdrop-blur-md bg-white/5 rounded-2xl mb-16">
                <div class="w-20 md:w-32">
                    <span id="days" class="hero-font block text-6xl md:text-9xl font-black">00</span>
                    <small class="sc-font text-[10px] uppercase tracking-widest text-gold opacity-60">Days</small>
                </div>
                <div class="w-20 md:w-32">
                    <span id="hours" class="hero-font block text-6xl md:text-9xl font-black">00</span>
                    <small class="sc-font text-[10px] uppercase tracking-widest text-gold opacity-60">Hours</small>
                </div>
                <div class="w-20 md:w-32">
                    <span id="minutes" class="hero-font block text-6xl md:text-9xl font-black">00</span>
                    <small class="sc-font text-[10px] uppercase tracking-widest text-gold opacity-60">Mins</small>
                </div>
                <div class="w-20 md:w-32">
                    <span id="seconds" class="hero-font block text-6xl md:text-9xl font-black text-gold">00</span>
                    <small class="sc-font text-[10px] uppercase tracking-widest text-white/30">Secs</small>
                </div>
            </div>

            <div id="action-area" class="h-20 flex justify-center items-center">
                <p id="countdown-lock" class="sc-font lock-notice"><i class="fas fa-lock mr-2"></i> Initializing System</p>
                
                <button id="launch-trigger" class="ultimate-btn px-16 py-6 rounded-full font-extrabold uppercase tracking-widest text-sm flex items-center gap-3">
                    <i class="fas fa-fire mr-2"></i> Launch Digital Future
                </button>
            </div>
        </main>

        <footer class="text-xs text-white/30 sc-font tracking-widest uppercase py-4 opacity-fade">
            Warangal, Telangana • Paramount Educational Society
        </footer>

    </div>

    <script>
        let scene, camera, renderer, rocketModel, starSphere;
        const loader = new THREE.GLTLoader();

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.set(0, 50, 250);

            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('three-canvas'), alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);

            // -- Premium Lighting --
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(50, 100, 50);
            scene.add(directionalLight);

            // -- Load 3D Rocket Model (Using a placeholder GLTF) --
            loader.load('https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/models/gltf/RocketShip.glb', (gltf) => {
                rocketModel = gltf.scene;
                rocketModel.scale.set(10, 10, 10); // Adjust size as needed
                rocketModel.position.y = -50; // Position it below the content initially
                rocketModel.rotation.x = Math.PI / 2; // Orient correctly
                scene.add(rocketModel);
                
                // Once model is loaded, start intro animations
                startAnimations();
            });

            // -- Subdued Star Field --
            const starGeometry = new THREE.BufferGeometry();
            const stars = [];
            for ( let i = 0; i < 6000; i ++ ) {
                stars.push( (Math.random() - 0.5) * 800, (Math.random() - 0.5) * 800, (Math.random() - 0.5) * 800 );
            }
            starGeometry.setAttribute( 'position', new THREE.Float32BufferAttribute( stars, 3 ) );
            const starMaterial = new THREE.PointsMaterial({ size: 0.5, color: 0xffffff, transparent: true, opacity: 0.3 });
            starSphere = new THREE.Points(starGeometry, starMaterial);
            scene.add(starSphere);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            if (rocketModel) {
                // Subtle rotation pre-launch
                rocketModel.rotation.y += 0.001; 
            }
            starSphere.rotation.x += 0.0005;
            renderer.render(scene, camera);
        }

        function startAnimations() {
            const tl = gsap.timeline();
            tl.to("#overlay", { opacity: 1, duration: 2, ease: "power2.out" })
              .from("#overlay *", { y: 30, stagger: 0.1, duration: 1, opacity: 0, ease: "power2.out" }, "-=1.5");
        }

        // --- Countdown Update Loop (Target: May 20, 2026) ---
        const launchDate = new Date("May 20, 2026 09:00:00").getTime();
        
        const interval = setInterval(() => {
            const now = new Date().getTime();
            const gap = launchDate - now;

            const second = 1000, minute = second * 60, hour = minute * 60, day = hour * 24;

            if (gap <= 0) {
                clearInterval(interval);
                // Zero out the display
                document.querySelectorAll("#countdown-container span").forEach(s => s.innerText = "00");
                activateLaunchSequence();
                return;
            }

            document.getElementById('days').innerText = String(Math.floor(gap / day)).padStart(2, '0');
            document.getElementById('hours').innerText = String(Math.floor((gap % day) / hour)).padStart(2, '0');
            document.getElementById('minutes').innerText = String(Math.floor((gap % hour) / minute)).padStart(2, '0');
            document.getElementById('seconds').innerText = String(Math.floor((gap % minute) / second)).padStart(2, '0');
        }, 1000);

        // --- PHASE 1: Activate the Trigger Button ---
        function activateLaunchSequence() {
            // Hide "Locked" text
            gsap.to("#countdown-lock", { duration: 0.5, opacity: 0, y: -10, onComplete: () => {
                document.getElementById('countdown-lock').style.display = 'none';
            }});

            // Reveal "Launch Digital Future" button
            const triggerBtn = document.getElementById('launch-trigger');
            triggerBtn.style.display = 'flex';
            gsap.fromTo("#launch-trigger", { scale: 0.5, opacity: 0 }, { duration: 1.5, scale: 1, opacity: 1, ease: "elastic.out(1, 0.5)" });
            
            // Add click listener
            triggerBtn.addEventListener('click', startRocketLaunch);
        }

        // --- PHASE 2: The actual Rocket Launch sequence ---
        function startRocketLaunch() {
            // 1. Hide the trigger button permanently
            gsap.to("#launch-trigger", { duration: 0.5, opacity: 0, scale: 0.8, onComplete: () => {
                document.getElementById('launch-trigger').style.display = 'none';
            }});

            const launchTL = gsap.timeline();

            // 2. Focus camera on Rocket (Zoom in)
            launchTL.to(camera.position, { z: 150, y: 30, duration: 2, ease: "power3.inOut" });

            // 3. Shake the scene (GSAP random vibration)
            launchTL.to("#three-canvas", { duration: 0.1, x: "+=5", yoyo: true, repeat: 10 }, "-=1");

            // 4. Fire/Smoke effect (Simplified with lighting color shift)
            if (rocketModel) {
                 scene.add(new THREE.PointLight(0xffaa00, 2, 100).position.set(0, -60, 0)); // Intense engine light
                 scene.fog = new THREE.FogExp2( 0x111111, 0.005 ); // Add 'smoke'
            }

            // 5. Rocket Ascension (Launch!)
            launchTL.to(rocketModel.position, { y: 300, duration: 4, ease: "power4.in" }, "+=0.5");

            // 6. Fade out the whole sequence
            launchTL.to("body", { backgroundColor: "#000000", opacity: 0, duration: 1.5, onComplete: () => {
                // 7. FINALLY REDIRECT to the actual portal
                window.location.href = "https://paramountschooledu.in/";
            }}, "+=1");
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Initialize 3D on load
        init3D();
    </script>
</body>
</html>
