<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paramount School | Cinematic Grand Launch</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,900&family=Playfair+Display+SC:wght@700;900&family=Tenor+Sans&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        :root {
            --brand-gold: #e2c069;
            --off-white: #fdfdfd;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000408;
            color: var(--off-white);
            font-family: 'Tenor Sans', sans-serif;
            overflow: hidden;
            user-select: none;
        }

        .hero-font { font-family: 'Playfair Display', serif; }
        .sc-font { font-family: 'Playfair Display SC', serif; }

        #three-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
            width: 100%;
            height: 100%;
        }

        /* Responsive UI Overlay layer sitting over WebGL scene */
        .content-overlay {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            flex-col: justify-between;
            pointer-events: none; /* Let clicks pass through to 3D elements */
        }

        .interactive-element {
            pointer-events: auto; /* Re-enable clicks for buttons */
        }

        /* Gold-Line Digital Countdown Display Window */
        .premium-countdown-board {
            border: 1px solid rgba(226, 192, 105, 0.3);
            background: rgba(0, 4, 8, 0.4);
            backdrop-filter: blur(25px);
            box-shadow: 0 0 50px rgba(226, 192, 105, 0.1), inset 0 0 20px rgba(226, 192, 105, 0.05);
        }

        .gold-text { color: var(--brand-gold); }

        .status-pill {
            background: rgba(0,0,0,0.8);
            border: 1px solid rgba(226, 192, 105, 0.2);
            letter-spacing: 5px;
        }
    </style>
</head>
<body>

    <canvas id="three-canvas"></canvas>

    <div class="content-overlay h-screen flex flex-col justify-between p-8 md:p-12 text-center" id="overlay">
        
        <header class="w-full">
            <h2 class="sc-font gold-text text-sm md:text-lg tracking-[0.6em] font-bold uppercase">Paramount School</h2>
            <div class="sc-font text-4xl md:text-7xl tracking-tight hero-font italic opacity-90 text-white">Warangal</div>
        </header>

        <main class="w-full max-w-4xl mx-auto">
            
            <div id="countdown-container" class="premium-countdown-board py-8 px-4 md:px-12 flex gap-4 md:gap-16 justify-center rounded-3xl mb-12">
                <div class="w-16 md:w-28">
                    <span id="days" class="hero-font block text-4xl md:text-7xl font-black text-white">00</span>
                    <small class="sc-font text-[9px] md:text-[10px] uppercase tracking-widest gold-text font-bold">Days</small>
                </div>
                <div class="w-16 md:w-28">
                    <span id="hours" class="hero-font block text-4xl md:text-7xl font-black text-white">00</span>
                    <small class="sc-font text-[9px] md:text-[10px] uppercase tracking-widest gold-text font-bold">Hours</small>
                </div>
                <div class="w-16 md:w-28">
                    <span id="minutes" class="hero-font block text-4xl md:text-7xl font-black text-white">00</span>
                    <small class="sc-font text-[9px] md:text-[10px] uppercase tracking-widest gold-text font-bold">Mins</small>
                </div>
                <div class="w-16 md:w-28">
                    <span id="seconds" class="hero-font block text-4xl md:text-7xl font-black gold-text">00</span>
                    <small class="sc-font text-[9px] md:text-[10px] uppercase tracking-widest text-white/40">Secs</small>
                </div>
            </div>

            <div class="h-24 flex flex-col items-center justify-center">
                <div id="system-lock-notice" class="status-pill text-xs px-8 py-3 rounded-full uppercase font-bold text-white/50">
                    <i class="fas fa-satellite-dish mr-2 text-yellow-500 animate-pulse"></i> Systems Locked Until T-Zero
                </div>
                
                <button id="html-launch-btn" class="interactive-element hidden bg-gradient-to-r from-yellow-600 via-amber-400 to-yellow-600 px-16 py-5 rounded-full text-black font-black uppercase tracking-widest text-sm shadow-[0_0_50px_rgba(226,192,105,0.5)] hover:scale-105 transition-transform">
                    <i class="fas fa-fire-alt mr-2"></i> Ignite Digital Future
                </button>
            </div>

        </main>

        <footer class="text-[10px] tracking-[0.3em] uppercase text-white/30">
            Warangal, Telangana • Core Infrastructure Platform Init 2026
        </footer>
    </div>

    <script>
        let scene, camera, renderer, starParticles, rocketMasterGroup;
        let fireParticles, engineFireGlow, launchpadBase;
        let launchTriggerActive = false;

        function buildCosmosStage() {
            // --- 1. INITIALIZE SCENE & ENGINE STAGE ---
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020813);
            scene.fog = new THREE.FogExp2(0x020813, 0.0015);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.set(0, 35, 200);

            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('three-canvas'), antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            // --- 2. LUXURY STUDIO LIGHTING MATRIX ---
            const ambient = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambient);

            const platformLight = new THREE.DirectionalLight(0xfff5df, 1.2);
            platformLight.position.set(40, 150, 60);
            scene.add(platformLight);

            const cosmicFillLight = new THREE.PointLight(0x3a86ff, 1.5, 300);
            cosmicFillLight.position.set(-80, 50, -50);
            scene.add(cosmicFillLight);

            // --- 3. PROCEDURAL ENVIRONMENT SCENERY GENERATION ---
            // High Density Star Arrays (The Space Backdrop)
            const starGeom = new THREE.BufferGeometry();
            const starPositions = [];
            for(let i=0; i<8000; i++) {
                starPositions.push((Math.random()-0.5)*1000, (Math.random()-0.5)*1000, (Math.random()-0.5)*1000);
            }
            starGeom.setAttribute('position', new THREE.Float32BufferAttribute(starPositions, 3));
            const starMat = new THREE.PointsMaterial({ size: 0.6, color: 0xffffff, transparent: true, opacity: 0.6 });
            starParticles = new THREE.Points(starGeom, starMat);
            scene.add(starParticles);

            // Ground Launchpad Concrete Base
            const baseGeom = new THREE.CylinderGeometry(80, 90, 8, 4);
            const baseMat = new THREE.MeshStandardMaterial({ color: 0x1a2230, roughness: 0.7, metalness: 0.5 });
            launchpadBase = new THREE.Mesh(baseGeom, baseMat);
            launchpadBase.position.y = -64;
            launchpadBase.rotation.y = Math.PI / 4;
            scene.add(launchpadBase);

            // 3D Audience Stadium Seating Frames (Flanking the Pad)
            const stadiumGroup = new THREE.Group();
            const blockMat = new THREE.MeshStandardMaterial({ color: 0x0c1017, roughness: 0.9 });
            for(let i=0; i<12; i++) {
                const stepGeom = new THREE.BoxGeometry(40, 4 + (i*4), 100);
                const leftStep = new THREE.Mesh(stepGeom, blockMat);
                leftStep.position.set(-110 - (i*5), -60 + (i*2), 0);
                const rightStep = leftStep.clone();
                rightStep.position.x = 110 + (i*5);
                stadiumGroup.add(leftStep, rightStep);
            }
            scene.add(stadiumGroup);

            // --- 4. PROCEDURAL HIERARCHICAL 3D ROCKET ASSEMBLY ---
            rocketMasterGroup = new THREE.Group();

            const goldChromeMat = new THREE.MeshStandardMaterial({ color: 0xe2c069, roughness: 0.15, metalness: 0.85 });
            const darkTitaniumMat = new THREE.MeshStandardMaterial({ color: 0x1f242d, roughness: 0.4, metalness: 0.7 });
            const enginePlumeMat = new THREE.MeshBasicMaterial({ color: 0xff4500, transparent: true, opacity: 0.7 });

            // Main Core Cylinder Booster Body
            const coreGeom = new THREE.CylinderGeometry(7, 7.5, 55, 32);
            const coreBooster = new THREE.Mesh(coreGeom, goldChromeMat);
            coreBooster.position.y = 27.5;
            rocketMasterGroup.add(coreBooster);

            // Aerodynamic Apex Nose Cone
            const noseGeom = new THREE.ConeGeometry(7, 18, 32);
            const noseCone = new THREE.Mesh(noseGeom, darkTitaniumMat);
            noseCone.position.y = 64;
            rocketMasterGroup.add(noseCone);

            // Twin Side Strapon Booster Pod Cylinders
            const sidePodGeom = new THREE.CylinderGeometry(3, 3.2, 38, 16);
            const leftPod = new THREE.Mesh(sidePodGeom, goldChromeMat);
            leftPod.position.set(-10.5, 19, 0);
            const rightPod = leftPod.clone();
            rightPod.position.x = 10.5;
            rocketMasterGroup.add(leftPod, rightPod);

            // Side Booster Nose Cones
            const sideNoseGeom = new THREE.ConeGeometry(3, 8, 16);
            const leftSideNose = new THREE.Mesh(sideNoseGeom, darkTitaniumMat);
            leftSideNose.position.set(-10.5, 42, 0);
            const rightSideNose = leftSideNose.clone();
            rightSideNose.position.x = 10.5;
            rocketMasterGroup.add(leftSideNose, rightSideNose);

            // Primary Bell Thruster Nozzle
            const nozzleGeom = new THREE.CylinderGeometry(4, 6, 6, 16);
            const mainNozzle = new THREE.Mesh(nozzleGeom, darkTitaniumMat);
            mainNozzle.position.y = -3;
            rocketMasterGroup.add(mainNozzle);

            // Idle Exhaust Internal Core Glow Element
            const flameGeom = new THREE.ConeGeometry(5, 12, 16);
            flameGeom.rotateX(Math.PI);
            engineFireGlow = new THREE.Mesh(flameGeom, enginePlumeMat);
            engineFireGlow.position.y = -9;
            rocketMasterGroup.add(engineFireGlow);

            // --- 5. ROCKET ENGINE ENGINE FIRE PARTICLE VECTOR EMITTER ---
            const fireGeom = new THREE.BufferGeometry();
            const firePositions = [];
            for(let i=0; i<300; i++) {
                firePositions.push((Math.random()-0.5)*8, -6 - (Math.random()*15), (Math.random()-0.5)*8);
            }
            fireGeom.setAttribute('position', new THREE.Float32BufferAttribute(firePositions, 3));
            const fireMat = new THREE.PointsMaterial({ size: 2.5, color: 0xffaa00, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending });
            fireParticles = new THREE.Points(fireGeom, fireMat);
            rocketMasterGroup.add(fireParticles);

            // Set final structural baseline position
            rocketMasterGroup.position.set(0, -56, 0);
            scene.add(rocketMasterGroup);

            // Render Core Systems
            gsap.to("#overlay", { opacity: 1, duration: 1.5 });
            renderEngineLoop();
        }

        // --- GLOBAL FRAME TICKING RENDER RENDERING ENGINE ---
        function renderEngineLoop() {
            requestAnimationFrame(renderEngineLoop);
            
            const elapsedTicks = performance.now() * 0.001;

            // Slow cinematic orbit rotational stabilization drift
            if(starParticles) { starParticles.rotation.y = elapsedTicks * 0.01; }
            
            if(rocketMasterGroup && !launchTriggerActive) {
                // Pre-launch structure idling stabilization hum oscillation
                rocketMasterGroup.rotation.y = Math.sin(elapsedTicks) * 0.04;
                
                // Animate idle engine heat micro pulsing waves
                engineFireGlow.scale.set(1 + Math.sin(elapsedTicks*20)*0.1, 1 + Math.cos(elapsedTicks*20)*0.1, 1);
                
                // Cycle fire particles loop arrays array mapping offset vector
                const positions = fireParticles.geometry.attributes.position.array;
                for(let i=1; i<positions.length; i+=3) {
                    positions[i] -= 0.4; // Force fluid descent velocity downward
                    if(positions[i] < -25) positions[i] = -6; // Reset emitter boundary
                }
                fireParticles.geometry.attributes.position.needsUpdate = true;
            }

            renderer.render(scene, camera);
        }

        // --- DIGITAL COUNTDOWN TIMER CHRONOMETER SYSTEM ---
        const scheduledTime = new Date("May 20, 2026 09:00:00").getTime();

        const timeSyncLoop = setInterval(() => {
            const timeDelta = scheduledTime - new Date().getTime();
            const secondUnit = 1000, minuteUnit = secondUnit * 60, hourUnit = minuteUnit * 60, dayUnit = hourUnit * 24;

            if (timeDelta <= 0) {
                clearInterval(timeSyncLoop);
                document.querySelectorAll("#countdown-container span").forEach(box => box.innerText = "00");
                unlockLaunchMechanics();
                return;
            }

            document.getElementById('days').innerText = String(Math.floor(timeDelta / dayUnit)).padStart(2, '0');
            document.getElementById('hours').innerText = String(Math.floor((timeDelta % dayUnit) / hourUnit)).padStart(2, '0');
            document.getElementById('minutes').innerText = String(Math.floor((timeDelta % hourUnit) / minuteUnit)).padStart(2, '0');
            document.getElementById('seconds').innerText = String(Math.floor((timeDelta % minuteUnit) / secondUnit)).padStart(2, '0');
        }, 1000);

        // --- UNLOCK PORTAL CHANNELS SEQUENCE (Timer hits 0) ---
        function unlockLaunchMechanics() {
            document.getElementById('system-lock-notice').style.display = 'none';
            const actionButton = document.getElementById('html-launch-btn');
            actionButton.style.display = 'inline-block';
            
            // Register execution event listeners handlers directly
            actionButton.addEventListener('click', activateKineticPropulsionBlastOff);
        }

        // --- KINETIC PROPULSION IGNITION INITIATION LIFT SCENE ---
        function activateKineticPropulsionBlastOff() {
            if(launchTriggerActive) return;
            launchTriggerActive = true;

            // Fade interactive interface layouts clean off the overlay layer immediately
            gsap.to(["#html-launch-btn", "#countdown-container", "header", "footer"], { opacity: 0, duration: 0.8, stagger: 0.1 });

            // Intense thermal dynamic point lighting flash bloom ignition vectors
            const fusionFlashLight = new THREE.PointLight(0x00ffff, 8, 300);
            fusionFlashLight.position.set(0, -50, 20);
            scene.add(fusionFlashLight);

            // Scale and warp procedural engine exhausts to full overdrive states
            gsap.to(engineFireGlow.scale, { x: 4, z: 4, y: 5, duration: 1.5 });
            engineFireGlow.material.color.setHex(0x00ffff); // Shift standard flame spectrum to ultra high-temp Cyan Plasma

            // Mutate standard particles vector limits array dimensions dynamically on loop
            const hyperPositions = fireParticles.geometry.attributes.position.array;
            fireParticles.material.size = 6.0;
            fireParticles.material.color.setHex(0x00ffcc);

            setInterval(() => {
                for(let i=0; i<hyperPositions.length; i+=3) {
                    hyperPositions[i] += (Math.random()-0.5)*4;      // Violent outward expansion
                    hyperPositions[i+1] -= 3.5;                      // Violent velocity downward acceleration
                    hyperPositions[i+2] += (Math.random()-0.5)*4;
                    if(hyperPositions[i+1] < -90) hyperPositions[i+1] = -6;
                }
                fireParticles.geometry.attributes.position.needsUpdate = true;
            }, 16);

            const launchTimeline = gsap.timeline();

            // Phase A: Camera structural framing focus adjustment zoom tracking positioning
            launchTimeline.to(camera.position, { z: 140, y: 10, duration: 2.5, ease: "power3.inOut" });

            // Phase B: Tectonic platform seismic structural oscillation matrix hum shake (Vibrate Canvas)
            launchTimeline.to("#three-canvas", { duration: 0.06, x: "+=12", yoyo: true, repeat: 30 }, "-=1.5")
                          .to("#three-canvas", { duration: 0.06, y: "+=8", yoyo: true, repeat: 30 }, "-=1.5");

            // Phase C: Kinetic lift-off rocket vehicle elevation escape acceleration velocity drive
            launchTimeline.to(rocketMasterGroup.position, { y: 450, duration: 4.5, ease: "power4.in" }, "+=0.2");

            // Phase D: Deep spatial environmental fog system dissipation sweep fade into dark void space
            launchTimeline.to(scene.fog, { density: 0.04, duration: 2 }, "-=3");

            // Phase E: Global absolute system domain router path tracking transfer redirect execution
            launchTimeline.to("body", { opacity: 0, duration: 1.5, onComplete: () => {
                window.location.href = "https://paramountschooledu.in/";
            }}, "+=0.5");
        }

        // Viewport structural safety dynamic screen-scale resize auto calculations tracking metrics
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Fire rendering configurations setup execution on window load array context
        window.onload = buildCosmosStage;
    </script>
</body>
</html>
